# Blueprint Render — Homologação + Produção (mesmo repositório, mesmo build)
#
# Homologação: https://ultrafrio-homologacao.onrender.com — deploy automático
# Produção:    https://wms.docalivre.com.br — deploy manual (Auto Deploy off)
#
# Os dois usam o mesmo Supabase (public/supabase-config.json + variáveis VITE_SUPABASE_*).
services:
  - type: web
    name: ultrafrio-homologacao
    runtime: static
    autoDeployTrigger: commit
    buildCommand: npm ci --no-audit --no-fund && node scripts/write-supabase-config.mjs && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: NODE_VERSION
        value: "20.19.0"
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false

  - type: web
    name: ultrafrio-producao
    runtime: static
    autoDeployTrigger: off
    buildCommand: npm ci --no-audit --no-fund && node scripts/write-supabase-config.mjs && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: NODE_VERSION
        value: "20.19.0"
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
